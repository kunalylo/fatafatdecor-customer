<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F9A8D4"/>
      <stop offset="100%" style="stop-color:#BE185D"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <rect width="512" height="256" rx="0" ry="0" fill="url(#shine)"/>
  <rect width="512" height="256" rx="110" ry="110" fill="url(#shine)"/>

  <!-- Balloon 1 (left) -->
  <ellipse cx="168" cy="210" rx="52" ry="65" fill="white" opacity="0.95"/>
  <line x1="168" y1="275" x2="162" y2="340" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <!-- Balloon knot -->
  <ellipse cx="166" cy="278" rx="6" ry="4" fill="white" opacity="0.9"/>

  <!-- Balloon 2 (center, larger) -->
  <ellipse cx="256" cy="195" rx="62" ry="78" fill="white" opacity="1"/>
  <line x1="256" y1="273" x2="250" y2="345" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <ellipse cx="254" cy="276" rx="7" ry="5" fill="white" opacity="0.9"/>

  <!-- Balloon 3 (right) -->
  <ellipse cx="344" cy="210" rx="52" ry="65" fill="white" opacity="0.95"/>
  <line x1="344" y1="275" x2="338" y2="340" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  <ellipse cx="342" cy="278" rx="6" ry="4" fill="white" opacity="0.9"/>

  <!-- String tied together -->
  <path d="M162 340 Q206 360 250 345 Q250 360 256 370 Q262 360 262 345 Q306 360 338 340"
        stroke="white" stroke-width="3.5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Sparkle stars -->
  <g fill="white" opacity="0.9">
    <!-- Star top left -->
    <polygon points="100,100 104,112 116,112 106,119 110,131 100,124 90,131 94,119 84,112 96,112" transform="scale(0.7) translate(70,40)"/>
    <!-- Star top right -->
    <polygon points="100,100 104,112 116,112 106,119 110,131 100,124 90,131 94,119 84,112 96,112" transform="scale(0.55) translate(520,30)"/>
    <!-- Star bottom right -->
    <polygon points="100,100 104,112 116,112 106,119 110,131 100,124 90,131 94,119 84,112 96,112" transform="scale(0.45) translate(720,480)"/>
  </g>

  <!-- FD text at bottom -->
  <text x="256" y="430"
        font-family="Arial, sans-serif"
        font-weight="900"
        font-size="62"
        text-anchor="middle"
        fill="white"
        opacity="0.95"
        letter-spacing="3">FatafatDecor</text>
</svg>
